<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Join MyGGV</title>
    <style>
      :root {
        --green: #2fa84f;
        --yellow: #fffa66;
        --ink: #1a1a1a;
        --muted: #6b7280;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--yellow);
        color: var(--ink);
      }
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 28px 24px;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        text-align: center;
      }
      h1 {
        font-size: 22px;
        margin: 4px 0 6px;
      }
      p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 18px;
      }
      .code-label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .code-row {
        display: flex;
        gap: 8px;
        margin-bottom: 22px;
      }
      .code {
        flex: 1;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 3px;
        color: var(--green);
        background: #f3faf4;
        border: 1px dashed var(--green);
        border-radius: 12px;
        padding: 14px 8px;
        user-select: all;
      }
      button,
      .btn {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 15px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        margin-bottom: 10px;
      }
      .btn-primary {
        background: var(--green);
        color: #fff;
      }
      .btn-secondary {
        background: #eef1f4;
        color: var(--ink);
      }
      .copy {
        width: 56px;
        flex: 0 0 56px;
        background: var(--green);
        color: #fff;
        font-size: 13px;
        border-radius: 12px;
      }
      .hint {
        font-size: 13px;
        color: var(--muted);
        margin-top: 16px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎁 Join MyGGV</h1>
      <p>You've been invited! Install the app, sign up, then enter the code below to both get 10 coins.</p>

      <div id="codeBlock" class="hidden">
        <div class="code-label">Your referral code</div>
        <div class="code-row">
          <div class="code" id="code">--------</div>
          <button class="copy" id="copyBtn" type="button">Copy</button>
        </div>
      </div>

      <a class="btn btn-primary" id="play" href="#">Get it on Google Play</a>
      <a class="btn btn-primary" id="appstore" href="#">Download on the App Store</a>

      <div class="hint" id="hint"></div>
    </div>

    <script>
      (function () {
        var PLAY = 'https://play.google.com/store/apps/details?id=com.myggv.app';
        var APPSTORE = 'https://apps.apple.com/app/myggv/id6757699416';

        var params = new URLSearchParams(location.search);
        var ref = (params.get('ref') || '').trim().toUpperCase().replace(/[^0-9A-Z]/g, '');

        var ua = navigator.userAgent || '';
        var isAndroid = /Android/i.test(ua);
        var isIOS = /iPhone|iPad|iPod/i.test(ua) || (/(Mac)/i.test(ua) && 'ontouchend' in document);

        // Android : on transporte le code via le paramètre `referrer` du Play Store
        // (lu plus tard par l'app via l'Install Referrer API — sans effet si non implémenté).
        var playUrl = ref ? PLAY + '&referrer=' + encodeURIComponent('ref=' + ref) : PLAY;
        document.getElementById('play').href = playUrl;
        document.getElementById('appstore').href = APPSTORE;

        // Code + copie
        if (ref) {
          document.getElementById('code').textContent = ref;
          document.getElementById('codeBlock').classList.remove('hidden');
          document.getElementById('copyBtn').addEventListener('click', function () {
            navigator.clipboard && navigator.clipboard.writeText(ref);
            this.textContent = 'Copied';
          });
        }

        // N'affiche que le store pertinent ; sur desktop, les deux.
        var play = document.getElementById('play');
        var appstore = document.getElementById('appstore');
        var hint = document.getElementById('hint');
        if (isAndroid && !isIOS) {
          appstore.classList.add('hidden');
          hint.textContent = ref ? 'After signing up, enter your code on the Share page.' : '';
        } else if (isIOS) {
          play.classList.add('hidden');
          hint.textContent = ref ? 'Copy your code, then enter it on the Share page after signing up.' : '';
        } else {
          appstore.classList.add('btn-secondary');
          appstore.classList.remove('btn-primary');
        }
      })();
    </script>
  </body>
</html>
